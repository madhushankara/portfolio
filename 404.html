<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | System Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        .error-term { font-family: monospace; color: var(--accent-primary); font-size: 1.2rem; margin: 2rem 0; background: rgba(0,0,0,0.5); padding: 1rem 2rem; border-left: 3px solid red; }
        .error-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
    </style>
</head>
<body>
    <div class="error-grid"></div>
    <div class="error-container container">
        <h1 class="glitch" data-text="404" style="font-size: 8rem; color: #fff;">404</h1>
        <div class="error-term">
            > ERROR: page_not_found<br>
            > rerouting to base...
        </div>
        <a href="index.html" class="btn btn-primary">Return to Base</a>
    </div>
</body>
</html>
