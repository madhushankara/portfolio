<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | System Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; position: relative; z-index: 1;
        }
        .error-term { 
            font-family: monospace; color: var(--accent); font-size: 1.2rem; 
            margin: 2rem 0; background: rgba(0,0,0,0.5); padding: 1.5rem 2.5rem; 
            border-left: 3px solid red; text-align: left;
        }
        .btn-home { margin-top: 1rem; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">MS<span>_</span></a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Return to Base</a></li>
                </ul>
                <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="container error-container">
        <h1 class="glitch" data-text="404" style="font-size: 8rem; color: #fff;">404</h1>
        <div class="error-term">
            > ERROR: page_not_found<br>
            > rerouting to base...
        </div>
        <a href="index.html" class="btn btn-primary btn-home">Return to Base</a>
    </div>

    <footer style="position: fixed; bottom: 0; width: 100%;">
        <div class="scanline"></div>
        <div class="container footer-content">
            <p>&copy; 2026 Madhu Shankara G S · Built with ⚡ & lots of caffeine</p>
        </div>
    </footer>

    <script src="js/main.js"></script>

</html>
